version: '3.8'

services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: ceng-carpool-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-ceng123456}
      MYSQL_DATABASE: ceng_carpool
      MYSQL_USER: ${DB_USERNAME:-ceng}
      MYSQL_PASSWORD: ${DB_PASSWORD:-ceng123456}
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./data/mysql:/var/log/mysql
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --max_connections=500
      --slow_query_log=1
      --long_query_time=2
    networks:
      - ceng-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 缓存
  redis:
    image: redis:6-alpine
    container_name: ceng-carpool-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-ceng123456}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./data/redis:/var/log/redis
    networks:
      - ceng-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 后端应用
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ceng-carpool-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_TYPE: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USERNAME: ceng
      DB_PASSWORD: ${DB_PASSWORD:-ceng123456}
      DB_DATABASE: ceng_carpool
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-ceng123456}
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production}
      JWT_EXPIRATION: 7d
      WECHAT_APP_ID: ${WECHAT_APP_ID}
      WECHAT_APP_SECRET: ${WECHAT_APP_SECRET}
      COS_BUCKET: ${COS_BUCKET}
      COS_REGION: ${COS_REGION}
      COS_SECRET_ID: ${COS_SECRET_ID}
      COS_SECRET_KEY: ${COS_SECRET_KEY}
      API_PREFIX: /api
    ports:
      - "3000:3000"
    volumes:
      - ./backend/data:/app/data
      - ./backend/logs:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ceng-network
    command: >
      sh -c "node dist/main.js"

  # Nginx 反向代理
  nginx:
    image: nginx:alpine
    container_name: ceng-carpool-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./ssl:/etc/nginx/ssl:ro
      - ./backend/dist:/var/www/backend:ro
    depends_on:
      - backend
    networks:
      - ceng-network

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local

networks:
  ceng-network:
    driver: bridge
