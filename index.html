<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>蹭蹭车 - 熟人社交互助出行平台</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; line-height: 1.6; color: #333; }
    .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
    header { background: linear-gradient(135deg, #07C160 0%, #05a850 100%); color: white; padding: 60px 0; }
    h1 { font-size: 48px; margin-bottom: 20px; }
    .tagline { font-size: 24px; opacity: 0.9; }
    .features { padding: 60px 0; background: #f5f5f5; }
    .feature-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; margin-top: 40px; }
    .feature-card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .feature-card h3 { color: #07C160; margin-bottom: 15px; font-size: 24px; }
    footer { background: #333; color: white; text-align: center; padding: 30px 0; }
    .btn { display: inline-block; padding: 12px 30px; background: white; color: #07C160; text-decoration: none; border-radius: 6px; font-weight: bold; margin-top: 20px; }
  </style>
</head>
<body>
  <header>
    <div class="container">
      <h1>蹭蹭车</h1>
      <p class="tagline">熟人社交互助出行平台 - 职场通勤 · 团建活动 · 邻里互助</p>
      <a href="https://github.com/duicym/enterprise-carpool" class="btn">GitHub</a>
    </div>
  </header>
  
  <section class="features">
    <div class="container">
      <h2 style="text-align: center; margin-bottom: 20px;">核心特性</h2>
      <div class="feature-grid">
        <div class="feature-card">
          <h3>👥 熟人社交</h3>
          <p>私域圈子 + 审核制，建立信任基础</p>
        </div>
        <div class="feature-card">
          <h3>🚗 智能匹配</h3>
          <p>团建活动智能车辆分配算法</p>
        </div>
        <div class="feature-card">
          <h3>💰 灵活付费</h3>
          <p>免费互助/AA 分摊/付费乘车三种模式</p>
        </div>
        <div class="feature-card">
          <h3>⭐ 信用体系</h3>
          <p>双向评价 + 信用分，保障出行安全</p>
        </div>
      </div>
    </div>
  </section>
  
  <footer>
    <p>MIT Licensed | Copyright © 2025 duicym</p>
  </footer>
</body>
</html>
